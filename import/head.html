<!-- YouTube otomatik title, meta, thumbnail ve schema -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const iframes = document.querySelectorAll('iframe[src*="youtube.com/embed"]');
  
  iframes.forEach(iframe => {
    try {
      const url = new URL(iframe.src);
      const videoId = url.pathname.split('/embed/')[1].split('?')[0];

      fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
      .then(res => res.json())
      .then(data => {
        // Başlık
        if(!document.title || document.title.trim() === "") document.title = data.title + " | Bandanee";
        const h1 = document.querySelector("h1");
        if(h1 && (!h1.textContent || h1.textContent.trim() === "")) h1.textContent = data.title;

        // Meta description
        const descMeta = document.querySelector('meta[name="description"]');
        if(descMeta && (!descMeta.getAttribute('content') || descMeta.getAttribute('content').trim() === ""))
          descMeta.setAttribute("content", data.title + " hakkında bilimsel kişisel gelişim ve zihinsel reset içerikleri.");

        // Open Graph
        const ogTitle = document.querySelector('meta[property="og:title"]');
        if(ogTitle && (!ogTitle.getAttribute("content") || ogTitle.getAttribute("content").trim() === ""))
          ogTitle.setAttribute("content", data.title);

        const ogDesc = document.querySelector('meta[property="og:description"]');
        if(ogDesc && (!ogDesc.getAttribute("content") || ogDesc.getAttribute("content").trim() === ""))
          ogDesc.setAttribute("content", data.title + " hakkında bilimsel kişisel gelişim ve zihinsel reset içerikleri.");

        // Twitter
        const twitterTitle = document.querySelector('meta[name="twitter:title"]');
        if(twitterTitle && (!twitterTitle.getAttribute("content") || twitterTitle.getAttribute("content").trim() === ""))
          twitterTitle.setAttribute("content", data.title);

        const twitterDesc = document.querySelector('meta[name="twitter:description"]');
        if(twitterDesc && (!twitterDesc.getAttribute("content") || twitterDesc.getAttribute("content").trim() === ""))
          twitterDesc.setAttribute("content", data.title + " hakkında bilimsel kişisel gelişim ve zihinsel reset içerikleri.");

        // Thumbnail
        const thumbnail = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
        const ogImage = document.querySelector('meta[property="og:image"]');
        const twitterImage = document.querySelector('meta[name="twitter:image"]');
        if(ogImage && (!ogImage.getAttribute("content") || ogImage.getAttribute("content").trim() === ""))
          ogImage.setAttribute("content", thumbnail);
        if(twitterImage && (!twitterImage.getAttribute("content") || twitterImage.getAttribute("content").trim() === ""))
          twitterImage.setAttribute("content", thumbnail);

        // Video Schema
        if(!document.querySelector('script[type="application/ld+json"]')){
          const schema = document.createElement('script');
          schema.type = 'application/ld+json';
          schema.text = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "VideoObject",
            "name": data.title,
            "description": data.title + " hakkında bilimsel kişisel gelişim ve zihinsel reset içerikleri.",
            "thumbnailUrl": thumbnail,
            "uploadDate": new Date().toISOString().split('T')[0],
            "embedUrl": iframe.src,
            "contentUrl": `https://www.youtube.com/watch?v=${videoId}`,
            "publisher": {
              "@type": "Organization",
              "name": "Bandanee"
            }
          });
          document.head.appendChild(schema);
        }
      })
      .catch(err => console.error("YouTube meta çekilemedi:", err));
    } catch(e) { console.error("iframe URL hatası", e); }
  });
});
</script>
