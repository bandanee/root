
<script>
(async () => {
  const mainContent = document.querySelector('main') || document.body;
  const h1 = mainContent.querySelector('h1,h2,h3');
  const pageTitle = h1 ? h1.textContent.trim() : document.title;

  const plainText = mainContent.textContent.replace(/\s+/g,' ').trim();
  const pageDescription = plainText.substring(0,160);

  const wordCounts = {};
  plainText.split(/\W+/).forEach(w=>{
    w=w.toLowerCase();
    if(w.length>3) wordCounts[w]=(wordCounts[w]||0)+1;
  });
  const sortedWords = Object.entries(wordCounts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,15)
    .map(e=>e[0]);
  const pageKeywords = sortedWords.join(', ');

  const canonical = window.location.href;

  document.title = pageTitle;

  const metaDescription = document.createElement('meta');
  metaDescription.name = "description";
  metaDescription.content = pageDescription;
  document.head.appendChild(metaDescription);

  const metaKeywords = document.createElement('meta');
  metaKeywords.name = "keywords";
  metaKeywords.content = pageKeywords;
  document.head.appendChild(metaKeywords);

  const linkCanonical = document.createElement('link');
  linkCanonical.rel = "canonical";
  linkCanonical.href = canonical;
  document.head.appendChild(linkCanonical);

  const ogProps = {title: pageTitle, description: pageDescription, url: canonical, type:'website'};
  Object.keys(ogProps).forEach(k=>{
    const meta = document.createElement('meta');
    meta.setAttribute('property','og:'+k);
    meta.content = ogProps[k];
    document.head.appendChild(meta);
  });

  const twProps = {card:'summary_large_image', title: pageTitle, description: pageDescription};
  Object.keys(twProps).forEach(k=>{
    const meta = document.createElement('meta');
    meta.name = 'twitter:'+k;
    meta.content = twProps[k];
    document.head.appendChild(meta);
  });

  const jsonLD = {
    "@context":"https://schema.org/",
    "@type":"WebPage",
    "name": pageTitle,
    "description": pageDescription,
    "url": canonical
  };
  const scriptJsonLD = document.createElement('script');
  scriptJsonLD.type="application/ld+json";
  scriptJsonLD.textContent = JSON.stringify(jsonLD);
  document.head.appendChild(scriptJsonLD);
})();
</script>
